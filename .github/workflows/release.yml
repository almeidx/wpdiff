name: Release

on:
  push:
    tags: ["v*"]

concurrency:
  group: release
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  version:
    name: Get Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v6

      - name: Get version
        id: version
        run: |
          VERSION=$(grep -m1 '^version' Cargo.toml | sed 's/.*"\(.*\)".*/\1/')
          TAG="v$VERSION"
          echo "Version: $VERSION"
          echo "Tag: $TAG"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT

  build-linux:
    name: Build Linux (x64)
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Install musl tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: linux-x64
          cache-on-failure: true

      - name: Build
        run: cargo build --release --target x86_64-unknown-linux-musl

      - name: Prepare artifact
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          strip target/x86_64-unknown-linux-musl/release/wpdiff
          cp target/x86_64-unknown-linux-musl/release/wpdiff "wpdiff-${VERSION}-linux-x64"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: wpdiff-linux-x64
          path: wpdiff-${{ needs.version.outputs.version }}-linux-x64

  build-macos:
    name: Build macOS (ARM64)
    needs: version
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: macos-arm64
          cache-on-failure: true

      - name: Build
        run: cargo build --release --target aarch64-apple-darwin

      - name: Prepare artifact
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          strip target/aarch64-apple-darwin/release/wpdiff
          cp target/aarch64-apple-darwin/release/wpdiff "wpdiff-${VERSION}-macos-arm64"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: wpdiff-macos-arm64
          path: wpdiff-${{ needs.version.outputs.version }}-macos-arm64

  release:
    name: Create Release
    needs: [version, build-linux, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Collect release assets
        run: |
          mkdir -p release-assets
          find artifacts -type f -exec cp {} release-assets/ \;
          ls -la release-assets/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(needs.version.outputs.version, '-') }}
          generate_release_notes: true
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
